<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LISTEN Time Clock</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      text-align: center;
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .clock {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 24px;
      font-weight: bold;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tab-btn {
      border: none;
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 1.1rem;
      font-weight: bold;
      background: #dbe5f5;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #2563eb;
      color: #fff;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 16px;
    }

    .employee-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .employee-btn {
      border: none;
      border-radius: 14px;
      padding: 22px 12px;
      font-size: 1.2rem;
      font-weight: bold;
      background: #e9eef7;
      cursor: pointer;
      transition: 0.2s;
    }

    .employee-btn:hover {
      background: #dbe5f5;
    }

    .employee-btn.selected {
      background: #2563eb;
      color: #fff;
    }

    .selected-name {
      font-size: 1.5rem;
      text-align: center;
      font-weight: bold;
      min-height: 2em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 24px 12px;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
    }

    .clock-in { background: #16a34a; }
    .clock-out { background: #dc2626; }

    .message {
      text-align: center;
      font-size: 1.05rem;
      min-height: 1.5em;
      font-weight: bold;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }

    .date-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
      justify-content: space-between;
    }

    .date-row-left {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-input,
    .time-input,
    .password-input,
    .month-input,
    .name-select {
      padding: 12px;
      font-size: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .reload-btn {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    .sub-btn {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 0.95rem;
      font-weight: bold;
      background: #f8fafc;
      color: #475569;
      cursor: pointer;
    }

    .admin-btn {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      background: #f8fafc;
      color: #64748b;
      cursor: pointer;
    }

    .admin-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
      justify-content: flex-end;
    }

    .admin-status {
      font-size: 0.9rem;
      color: #475569;
    }

    .status-table-wrap {
      overflow-x: auto;
    }

    .status-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    .status-table th,
    .status-table td {
      border-bottom: 1px solid #ddd;
      padding: 12px 10px;
      text-align: center;
      vertical-align: middle;
    }

    .status-table th {
      background: #f1f5f9;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: bold;
    }

    .status-mis {
      background: #e5e7eb;
    }

    .status-working {
      background: #dcfce7;
      color: #166534;
    }

    .status-done {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .status-check {
      background: #fee2e2;
      color: #b91c1c;
    }

    .edit-link-btn {
      border: none;
      background: transparent;
      color: #2563eb;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .edit-row {
      background: #f8fafc;
    }

    .edit-box {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      padding: 6px 0;
    }

    .save-edit-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    .cancel-edit-btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 14px;
      background: #fff;
      color: #475569;
      cursor: pointer;
      font-weight: bold;
    }

    .monthly-box {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .monthly-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .employee-grid { grid-template-columns: 1fr; }
      .action-buttons { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 1.7rem; }
      .date-row { justify-content: flex-start; }
      .admin-bar { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="appTitle">LISTEN Time Clock</h1>
    <div class="clock" id="clock"></div>

    <div class="tabs">
      <button class="tab-btn active" id="tabClockBtn">打刻</button>
      <button class="tab-btn" id="tabStatusBtn">一覧</button>
    </div>

    <div id="clockView">
      <div class="card">
        <div class="section-title">従業員を選択してください</div>
        <div class="employee-grid" id="employeeList"></div>
      </div>

      <div class="card">
        <div class="section-title">選択中</div>
        <div class="selected-name" id="selectedName">未選択</div>
      </div>

      <div class="card">
        <div class="action-buttons">
          <button class="action-btn clock-in" id="clockInBtn">出勤</button>
          <button class="action-btn clock-out" id="clockOutBtn">退勤</button>
        </div>
      </div>

      <div class="card">
        <div class="message" id="message"></div>
      </div>
    </div>

    <div id="statusView" class="hidden">
      <div class="card">
        <div class="section-title">全員の出退勤状況</div>

        <div class="admin-bar">
          <span class="admin-status" id="adminStatus">管理者モード: OFF</span>
          <button id="adminToggleBtn" class="admin-btn">管理者</button>
          <div id="adminLoginArea" class="hidden">
            <input type="password" id="adminPassword" class="password-input" placeholder="パスワード">
            <button id="adminLoginBtn" class="sub-btn">ログイン</button>
            <button id="adminLogoutBtn" class="sub-btn hidden">解除</button>
          </div>
        </div>

        <div class="date-row">
          <div class="date-row-left">
            <label for="statusDate">日付</label>
            <input type="date" id="statusDate" class="date-input">
            <button id="loadStatusBtn" class="reload-btn">表示</button>
            <button id="exportCsvBtn" class="sub-btn">CSV出力</button>
          </div>
        </div>

        <div class="message" id="statusMessage"></div>

        <div class="status-table-wrap">
          <table class="status-table">
            <thead>
              <tr>
                <th>氏名</th>
                <th>出勤</th>
                <th>退勤</th>
                <th>状態</th>
                <th id="editHeader" class="hidden">編集</th>
              </tr>
            </thead>
            <tbody id="statusTableBody"></tbody>
          </table>
        </div>

        <div class="monthly-box">
          <div class="section-title">人別・月ごとCSV出力</div>
          <div class="monthly-row">
            <select id="monthlyNameSelect" class="name-select"></select>
            <input type="month" id="monthlyMonth" class="month-input">
            <button id="exportMonthlyCsvBtn" class="sub-btn">月次CSV出力</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let employees = [];
    let selectedEmployee = null;
    let currentStatuses = [];
    let editingName = "";
    let isAdminMode = false;

    const ADMIN_PASSWORD = "9059";

    let lastClock = {
      employeeId: "",
      actionType: "",
      timestamp: 0
    };

    const employeeList = document.getElementById("employeeList");
    const selectedName = document.getElementById("selectedName");
    const message = document.getElementById("message");
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");

    const tabClockBtn = document.getElementById("tabClockBtn");
    const tabStatusBtn = document.getElementById("tabStatusBtn");
    const clockView = document.getElementById("clockView");
    const statusView = document.getElementById("statusView");

    const statusDate = document.getElementById("statusDate");
    const loadStatusBtn = document.getElementById("loadStatusBtn");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const statusMessage = document.getElementById("statusMessage");
    const statusTableBody = document.getElementById("statusTableBody");
    const editHeader = document.getElementById("editHeader");

    const adminToggleBtn = document.getElementById("adminToggleBtn");
    const adminLoginArea = document.getElementById("adminLoginArea");
    const adminPassword = document.getElementById("adminPassword");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminLogoutBtn = document.getElementById("adminLogoutBtn");
    const adminStatus = document.getElementById("adminStatus");

    const monthlyNameSelect = document.getElementById("monthlyNameSelect");
    const monthlyMonth = document.getElementById("monthlyMonth");
    const exportMonthlyCsvBtn = document.getElementById("exportMonthlyCsvBtn");

    function setAppTitle() {
      try {
        if (typeof CONFIG !== "undefined" && CONFIG.APP_NAME) {
          document.title = CONFIG.APP_NAME;
          document.getElementById("appTitle").textContent = CONFIG.APP_NAME;
        }
      } catch (e) {
        console.error("setAppTitle error:", e);
      }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleString("ja-JP");
    }

    function formatDateForApi(dateValue) {
      return String(dateValue || "").replaceAll("-", "/");
    }

    function getTodayForInput() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getCurrentMonthForInput() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      return `${y}-${m}`;
    }

    function setActiveTab(mode) {
      if (mode === "clock") {
        tabClockBtn.classList.add("active");
        tabStatusBtn.classList.remove("active");
        clockView.classList.remove("hidden");
        statusView.classList.add("hidden");
      } else {
        tabClockBtn.classList.remove("active");
        tabStatusBtn.classList.add("active");
        clockView.classList.add("hidden");
        statusView.classList.remove("hidden");
      }
    }

    function updateAdminUi() {
      adminStatus.textContent = `管理者モード: ${isAdminMode ? "ON" : "OFF"}`;
      editHeader.classList.toggle("hidden", !isAdminMode);
      adminLogoutBtn.classList.toggle("hidden", !isAdminMode);
      renderStatusTable(currentStatuses);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderEmployees() {
      employeeList.innerHTML = "";

      if (!employees.length) {
        employeeList.innerHTML = "<div>従業員がいません</div>";
        return;
      }

      employees.forEach((employee) => {
        const button = document.createElement("button");
        button.className = "employee-btn";
        button.textContent = employee.name || "";

        if (selectedEmployee && selectedEmployee.employee_id === employee.employee_id) {
          button.classList.add("selected");
        }

        button.addEventListener("click", () => {
          selectedEmployee = employee;
          selectedName.textContent = employee.name || "";
          message.textContent = "";
          renderEmployees();
        });

        employeeList.appendChild(button);
      });
    }

    function renderMonthlySelect() {
      monthlyNameSelect.innerHTML = "";

      employees.forEach((emp) => {
        const option = document.createElement("option");
        option.value = emp.name || "";
        option.textContent = emp.name || "";
        monthlyNameSelect.appendChild(option);
      });
    }

    async function safeJson(response) {
      const text = await response.text();
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error(`JSONではない応答です: ${text.slice(0, 200)}`);
      }
    }

    async function loadEmployees() {
      try {
        message.textContent = "従業員一覧を読み込み中...";

        if (typeof CONFIG === "undefined" || !CONFIG.GAS_URL) {
          throw new Error("config.js の GAS_URL が読み込めていません");
        }

        const url = `${CONFIG.GAS_URL}?action=getEmployees&_ts=${Date.now()}`;
        console.log("loadEmployees URL:", url);

        const response = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        const data = await safeJson(response);
        console.log("loadEmployees response:", data);

        if (!data.success) {
          throw new Error(data.message || "従業員一覧の取得に失敗しました");
        }

        employees = Array.isArray(data.employees) ? data.employees : [];
        renderEmployees();
        renderMonthlySelect();
        message.textContent = "";
      } catch (error) {
        console.error("loadEmployees error:", error);
        employees = [];
        renderEmployees();
        message.textContent = `従業員一覧の取得に失敗しました: ${error.message}`;
      }
    }

    function getStatusBadge(status) {
      if (status === "未出勤") return '<span class="status-badge status-mis">未出勤</span>';
      if (status === "勤務中") return '<span class="status-badge status-working">勤務中</span>';
      if (status === "退勤済") return '<span class="status-badge status-done">退勤済</span>';
      if (status === "要確認") return '<span class="status-badge status-check">要確認</span>';
      return escapeHtml(status || "");
    }

    function renderStatusTable(statuses) {
      statusTableBody.innerHTML = "";

      if (!statuses.length) {
        const colSpan = isAdminMode ? 5 : 4;
        statusTableBody.innerHTML = `<tr><td colspan="${colSpan}">データがありません</td></tr>`;
        return;
      }

      statuses.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(item.name || "")}</td>
          <td>${escapeHtml(item.clockIn || "")}</td>
          <td>${escapeHtml(item.clockOut || "")}</td>
          <td>${getStatusBadge(item.status)}</td>
          ${isAdminMode ? `<td><button class="edit-link-btn" data-name="${escapeHtml(item.name || "")}">編集</button></td>` : ""}
        `;
        statusTableBody.appendChild(tr);

        if (isAdminMode && editingName === item.name) {
          const editTr = document.createElement("tr");
          editTr.className = "edit-row";
          editTr.innerHTML = `
            <td colspan="5">
              <div class="edit-box">
                <span>${escapeHtml(item.name || "")}</span>
                <label>出勤</label>
                <input type="time" step="1" id="editClockIn" class="time-input" value="${escapeHtml(item.clockIn || "")}">
                <label>退勤</label>
                <input type="time" step="1" id="editClockOut" class="time-input" value="${escapeHtml(item.clockOut || "")}">
                <button class="save-edit-btn" id="saveEditBtn">保存</button>
                <button class="cancel-edit-btn" id="cancelEditBtn">キャンセル</button>
              </div>
            </td>
          `;
          statusTableBody.appendChild(editTr);
        }
      });

      if (isAdminMode) {
        document.querySelectorAll(".edit-link-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            editingName = btn.dataset.name;
            renderStatusTable(currentStatuses);
            bindEditButtons();
          });
        });

        bindEditButtons();
      }
    }

    function bindEditButtons() {
      const saveEditBtn = document.getElementById("saveEditBtn");
      const cancelEditBtn = document.getElementById("cancelEditBtn");

      if (saveEditBtn) {
        saveEditBtn.addEventListener("click", saveEdit);
      }

      if (cancelEditBtn) {
        cancelEditBtn.addEventListener("click", () => {
          editingName = "";
          renderStatusTable(currentStatuses);
        });
      }
    }

    async function loadDailyStatus() {
      try {
        statusMessage.textContent = "一覧を読み込み中...";

        if (typeof CONFIG === "undefined" || !CONFIG.GAS_URL) {
          throw new Error("config.js の GAS_URL が読み込めていません");
        }

        const dateValue = statusDate.value || getTodayForInput();
        const apiDate = formatDateForApi(dateValue);
        const url = `${CONFIG.GAS_URL}?action=getDailyStatus&date=${encodeURIComponent(apiDate)}&_ts=${Date.now()}`;
        console.log("loadDailyStatus URL:", url);

        const response = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        const data = await safeJson(response);
        console.log("loadDailyStatus response:", data);

        if (!data.success) {
          throw new Error(data.message || "一覧の取得に失敗しました");
        }

        currentStatuses = Array.isArray(data.statuses) ? data.statuses : [];
        editingName = "";
        renderStatusTable(currentStatuses);
        statusMessage.textContent = "";
      } catch (error) {
        console.error("loadDailyStatus error:", error);
        currentStatuses = [];
        renderStatusTable(currentStatuses);
        statusMessage.textContent = `一覧の取得に失敗しました: ${error.message}`;
      }
    }

    function exportStatusCsv() {
      if (!currentStatuses.length) {
        statusMessage.textContent = "出力できるデータがありません";
        return;
      }

      const dateValue = statusDate.value || getTodayForInput();
      const header = ["日付", "氏名", "出勤", "退勤", "状態"];

      const rows = currentStatuses.map((item) => [
        dateValue.replaceAll("-", "/"),
        item.name || "",
        item.clockIn || "",
        item.clockOut || "",
        item.status || ""
      ]);

      const csvLines = [header, ...rows].map((row) =>
        row.map((value) => `"${String(value).replace(/"/g, '""')}"`).join(",")
      );

      const csvContent = "\uFEFF" + csvLines.join("\r\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      window.open(url, "_blank");
      statusMessage.textContent = "CSVを新しいタブで開きました";

      setTimeout(() => {
        statusMessage.textContent = "";
      }, 3000);
    }

    async function exportMonthlyCsv() {
      const name = monthlyNameSelect.value;
      const month = monthlyMonth.value;

      if (!name || !month) {
        statusMessage.textContent = "職員名と年月を選択してください";
        return;
      }

      try {
        statusMessage.textContent = "月次CSVデータを取得中...";

        if (typeof CONFIG === "undefined" || !CONFIG.GAS_URL) {
          throw new Error("config.js の GAS_URL が読み込めていません");
        }

        const url = `${CONFIG.GAS_URL}?action=getMonthlyStatus&name=${encodeURIComponent(name)}&month=${encodeURIComponent(month.replace("-", "/"))}&_ts=${Date.now()}`;
        console.log("exportMonthlyCsv URL:", url);

        const response = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        const data = await safeJson(response);
        console.log("exportMonthlyCsv response:", data);

        if (!data.success) {
          throw new Error(data.message || "月次CSVデータの取得に失敗しました");
        }

        const header = ["日付", "曜日", "氏名", "出勤", "退勤", "状態"];
        const rows = (data.rows || []).map((item) => [
          item.date || "",
          item.weekday || "",
          item.name || "",
          item.clockIn || "",
          item.clockOut || "",
          item.status || ""
        ]);

        if (!rows.length) {
          statusMessage.textContent = "出力できる月次データがありません";
          return;
        }

        const csvLines = [header, ...rows].map((row) =>
          row.map((value) => `"${String(value).replace(/"/g, '""')}"`).join(",")
        );

        const csvContent = "\uFEFF" + csvLines.join("\r\n");
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url2 = URL.createObjectURL(blob);

        window.open(url2, "_blank");
        statusMessage.textContent = "月次CSVを新しいタブで開きました";
      } catch (error) {
        console.error("exportMonthlyCsv error:", error);
        statusMessage.textContent = `月次CSVデータの取得に失敗しました: ${error.message}`;
      }
    }

    async function saveClock(actionType) {
      if (!selectedEmployee) {
        message.textContent = "従業員を選択してください";
        return;
      }

      const now = Date.now();
      const isSameEmployee = lastClock.employeeId === selectedEmployee.employee_id;
      const isSameAction = lastClock.actionType === actionType;
      const isWithin10Seconds = now - lastClock.timestamp < 10000;

      if (isSameEmployee && isSameAction && isWithin10Seconds) {
        const ok = confirm(`${selectedEmployee.name} さんの${actionType}が直前にも記録されています。もう一度記録しますか？`);
        if (!ok) return;
      }

      try {
        message.textContent = "保存中...";

        if (typeof CONFIG === "undefined" || !CONFIG.GAS_URL) {
          throw new Error("config.js の GAS_URL が読み込めていません");
        }

        const response = await fetch(CONFIG.GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "clock",
            name: selectedEmployee.name,
            employee_id: selectedEmployee.employee_id,
            actionType: actionType
          })
        });

        const data = await safeJson(response);
        console.log("saveClock response:", data);

        if (!data.success) {
          throw new Error(data.message || "保存に失敗しました");
        }

        message.textContent = data.message || "保存しました";

        lastClock = {
          employeeId: selectedEmployee.employee_id,
          actionType: actionType,
          timestamp: now
        };

        selectedEmployee = null;
        selectedName.textContent = "未選択";
        renderEmployees();

        await new Promise((resolve) => setTimeout(resolve, 500));
        await loadDailyStatus();

        setTimeout(() => {
          message.textContent = "";
        }, 3000);
      } catch (error) {
        console.error("saveClock error:", error);
        message.textContent = `保存に失敗しました: ${error.message}`;
      }
    }

    async function saveEdit() {
      if (!isAdminMode) {
        statusMessage.textContent = "管理者モードでログインしてください";
        return;
      }

      if (!editingName) {
        statusMessage.textContent = "編集対象が選ばれていません";
        return;
      }

      const dateValue = statusDate.value || getTodayForInput();
      const clockInEl = document.getElementById("editClockIn");
      const clockOutEl = document.getElementById("editClockOut");

      const clockIn = clockInEl ? clockInEl.value : "";
      const clockOut = clockOutEl ? clockOutEl.value : "";

      try {
        statusMessage.textContent = "修正内容を保存中...";

        if (typeof CONFIG === "undefined" || !CONFIG.GAS_URL) {
          throw new Error("config.js の GAS_URL が読み込めていません");
        }

        const response = await fetch(CONFIG.GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            action: "saveEdit",
            date: formatDateForApi(dateValue),
            name: editingName,
            clockIn: clockIn,
            clockOut: clockOut
          })
        });

        const data = await safeJson(response);
        console.log("saveEdit response:", data);

        if (!data.success) {
          throw new Error(data.message || "修正の保存に失敗しました");
        }

        editingName = "";
        statusMessage.textContent = data.message || "修正を保存しました";
        await loadDailyStatus();
      } catch (error) {
        console.error("saveEdit error:", error);
        statusMessage.textContent = `修正の保存に失敗しました: ${error.message}`;
      }
    }

    tabClockBtn.addEventListener("click", () => {
      setActiveTab("clock");
    });

    tabStatusBtn.addEventListener("click", async () => {
      setActiveTab("status");
      await loadDailyStatus();
    });

    loadStatusBtn.addEventListener("click", async () => {
      await loadDailyStatus();
    });

    exportCsvBtn.addEventListener("click", () => {
      exportStatusCsv();
    });

    exportMonthlyCsvBtn.addEventListener("click", async () => {
      await exportMonthlyCsv();
    });

    adminToggleBtn.addEventListener("click", () => {
      adminLoginArea.classList.toggle("hidden");
    });

    adminLoginBtn.addEventListener("click", () => {
      if (adminPassword.value === ADMIN_PASSWORD) {
        isAdminMode = true;
        adminPassword.value = "";
        statusMessage.textContent = "管理者モードを有効にしました";
      } else {
        isAdminMode = false;
        statusMessage.textContent = "パスワードが違います";
      }
      updateAdminUi();
    });

    adminLogoutBtn.addEventListener("click", () => {
      isAdminMode = false;
      editingName = "";
      statusMessage.textContent = "管理者モードを解除しました";
      updateAdminUi();
    });

    clockInBtn.addEventListener("click", () => saveClock("出勤"));
    clockOutBtn.addEventListener("click", () => saveClock("退勤"));

    async function init() {
      setAppTitle();
      updateClock();
      setInterval(updateClock, 1000);

      statusDate.value = getTodayForInput();
      monthlyMonth.value = getCurrentMonthForInput();

      updateAdminUi();
      await loadEmployees();
      await loadDailyStatus();
    }

    init();
  </script>
</body>
</html>
